name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Security Audit
      run: npm audit --audit-level=high
      continue-on-error: true # Non bloccare la build se ci sono vulnerabilità, ma segnalale nei log

    - name: Prisma Generate
      run: npx prisma generate

    - name: Build
      run: npm run build
      env:
        # Define any fallback env vars for build phase if necessary
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
        DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dummy"

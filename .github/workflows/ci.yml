name: CI Pipeline — Build, Test, Security

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  NODE_VERSION: "20"

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Security Audit (npm)
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Prisma Generate
      run: npx prisma generate
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
        DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dummy"

    - name: TypeScript Check + Build
      run: npm run build
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
        DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dummy"

  unit-tests:
    runs-on: ubuntu-latest
    needs: audit-and-build
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Run Unit Tests (Vitest)
      run: npm test -- --run

    - name: Security guards (Verbatel + dev-only)
      run: npx vitest run src/__tests__/security-guards.test.ts

  e2e-tests:
    runs-on: ubuntu-latest
    needs: audit-and-build
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: "npm"

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E Tests (Tenant Isolation + Security Headers)
      run: npx playwright test --project=chromium
      env:
        TEST_BASE_URL: ${{ secrets.STAGING_URL || 'https://gestionepolizialocale.it' }}
        TEST_TENANT_A: ${{ secrets.TEST_TENANT_A || 'altamura' }}
        TEST_USER_A: ${{ secrets.TEST_USER_A || 'TEST001' }}
        TEST_PASS_A: ${{ secrets.TEST_PASS_A || 'password123' }}
        TEST_TENANT_B: ${{ secrets.TEST_TENANT_B || 'gravina' }}
        TEST_USER_B: ${{ secrets.TEST_USER_B || 'TEST002' }}
        TEST_PASS_B: ${{ secrets.TEST_PASS_B || 'password123' }}
      continue-on-error: true

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  owasp-zap-scan:
    runs-on: ubuntu-latest
    needs: audit-and-build
    timeout-minutes: 30
    steps:
    - name: OWASP ZAP Full Scan
      uses: zaproxy/action-full-scan@v0.12.0
      with:
        target: ${{ secrets.STAGING_URL || 'https://gestionepolizialocale.it' }}
        cmd_options: "-a"
      continue-on-error: true

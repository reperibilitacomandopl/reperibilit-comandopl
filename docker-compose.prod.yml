# Produzione Oracle — app in ascolto solo su localhost (Nginx termina TLS)
# Uso: docker compose -f docker-compose.prod.yml up -d --build

services:
  portale-caserma:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-portale-caserma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

